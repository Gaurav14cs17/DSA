# Site Settings
title: "DSA Mastery"
description: "A comprehensive guide to Data Structures & Algorithms with 600+ LeetCode problems by Gaurav Goswami"
url: "https://gaurav14cs17.github.io"
baseurl: "/DSA"
repository: Gaurav14cs17/DSA

# Author Information
author:
  name: "Gaurav Goswami"
  github: "Gaurav14cs17"
  email: ""

# Theme
remote_theme: just-the-docs/just-the-docs@v0.8.2
color_scheme: dark

# Logo and favicon
logo: "/assets/images/logo.svg"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: true

# Aux links (top right)
aux_links:
  "GitHub":
    - "https://github.com/Gaurav14cs17/DSA"
  "Author":
    - "https://github.com/Gaurav14cs17"

aux_links_new_tab: true

# Footer
footer_content: "Made with ❤️ by <a href=\"https://github.com/Gaurav14cs17\">Gaurav Goswami</a> | <a href=\"https://github.com/Gaurav14cs17/DSA\">Contribute on GitHub</a>"

# Collections for organizing content
collections:
  topics:
    output: true
    permalink: /:collection/:path/

# Navigation
nav_enabled: true
nav_sort: case_insensitive

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Code copy button
enable_copy_code_button: true

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Mermaid diagrams
mermaid:
  version: "10.6.0"

# Build settings
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Exclude from processing
exclude:
  - .git
  - .gitignore
  - node_modules
  - vendor
  - Gemfile.lock
